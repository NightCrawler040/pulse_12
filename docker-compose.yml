version: '3.8'

services:
  pulse12-server:
    build: .
    container_name: pulse12-corporate
    restart: always
    ports:
      - "80:80"
    environment:
      - PORT=80
      - NODE_ENV=production
    volumes:
      - pulse12_data:/app/server/data

volumes:
  pulse12_data:
    name: pulse12_corporate_data
